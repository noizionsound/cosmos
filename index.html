<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>COSMOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
    }
    #c {
      display: block;
      cursor: none;
      position: relative;
      z-index: 1;
    }
    #starfield { display: block; }
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.94);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.90);
      font-family: 'Cinzel', 'Palatino Linotype', serif;
      letter-spacing: 0.35em;
      z-index: 10; user-select: none;
    }
    #overlay h1 {
      font-size: 32px; font-weight: 700; margin-bottom: 28px;
      letter-spacing: 0.50em;
    }
    #overlay p {
      font-size: 11px; opacity: 0.55;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.28em;
    }
    #overlay .controls {
      position: relative;
      margin-top: 36px;
      display: flex; gap: 32px;
      align-items: flex-start;
    }
    #overlay .ctrl-col {
      display: flex; flex-direction: column; gap: 8px;
      align-items: center;
    }
    #overlay .ctrl-row {
      display: flex; gap: 10px; align-items: center;
    }
    #overlay .ctrl-key {
      font-family: 'Cinzel', serif;
      font-size: 8px; letter-spacing: 0.20em;
      color: rgba(200,185,150,0.65);
      border: 1px solid rgba(200,185,150,0.28);
      padding: 3px 7px; min-width: 28px;
      text-align: center;
    }
    #overlay .ctrl-desc {
      font-family: 'Cinzel', serif;
      font-size: 8px; letter-spacing: 0.22em;
      color: rgba(200,185,150,0.38);
      white-space: nowrap;
    }
    #overlay .ctrl-sep {
      width: 1px; height: 56px;
      background: rgba(200,185,150,0.12);
      align-self: center;
    }

    /* ── Volume mixer panel ── */
    #vol-panel {
      position: fixed;
      bottom: 18px; right: 18px;
      z-index: 20;
      background: rgba(0,0,0,0.62);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 10px 14px 12px;
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: auto;
      user-select: none;
      backdrop-filter: blur(4px);
    }
    .vol-label {
      font-family: 'Cinzel', serif;
      font-size: 8px; letter-spacing: 0.30em;
      color: rgba(200,190,170,0.65);
      margin-bottom: 2px;
    }
    .vol-row {
      display: flex; align-items: center; gap: 8px;
    }
    .vol-row span {
      font-family: 'Cinzel', serif;
      font-size: 8px; letter-spacing: 0.25em;
      color: rgba(200,190,170,0.55);
      width: 46px;
    }
    .vol-row input[type=range] {
      -webkit-appearance: none;
      width: 88px; height: 2px;
      background: rgba(200,190,170,0.22);
      border-radius: 1px; outline: none; cursor: pointer;
    }
    .vol-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(200,190,165,0.80);
      cursor: pointer;
    }
    .vol-row input[type=range]::-moz-range-thumb {
      width: 10px; height: 10px;
      border-radius: 50%; border: none;
      background: rgba(200,190,165,0.80);
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="overlay">
  <canvas id="starfield" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0.55;"></canvas>
  <h1 style="position:relative;">C O S M O S</h1>
  <p style="position:relative; margin-top:12px; cursor:pointer;">click to begin</p>

  <div class="controls" style="position:relative;">
    <div class="ctrl-col">
      <div class="ctrl-row">
        <span class="ctrl-key">W</span><span class="ctrl-desc">move</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-key">A</span>
        <span class="ctrl-key">S</span>
        <span class="ctrl-key">D</span>
      </div>
      <div class="ctrl-desc" style="margin-top:2px;">or  ↑ ← ↓ →</div>
    </div>

    <div class="ctrl-sep"></div>

    <div class="ctrl-col">
      <div class="ctrl-row">
        <span class="ctrl-key">ENTER</span>
        <span class="ctrl-desc">enter bubble</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-key">ESC</span>
        <span class="ctrl-desc">exit bubble</span>
      </div>
    </div>
  </div>
</div>

<canvas id="c"></canvas>

<!-- Volume mixer — always visible, bottom-right corner -->
<div id="vol-panel">
  <div class="vol-label">M I X E R</div>
  <div class="vol-row">
    <span>WORLD</span>
    <input type="range" id="vol-world"   min="0" max="100" value="38">
  </div>
  <div class="vol-row">
    <span>FIRES</span>
    <input type="range" id="vol-fires"   min="0" max="100" value="48">
  </div>
  <div class="vol-row">
    <span>BUBBLES</span>
    <input type="range" id="vol-bubbles" min="0" max="100" value="65">
  </div>
</div>

<script>
// Starfield animation on the overlay
(function () {
  const oc = document.getElementById('starfield');
  const resize = () => { oc.width = window.innerWidth; oc.height = window.innerHeight; };
  resize(); window.addEventListener('resize', resize);
  const ox = oc.getContext('2d');
  const stars = Array.from({ length: 180 }, () => ({
    x: Math.random(), y: Math.random(),
    r: 0.4 + Math.random() * 1.2,
    op: 0.15 + Math.random() * 0.55,
    ph: Math.random() * Math.PI * 2,
    sp: 0.004 + Math.random() * 0.012,
  }));
  function tickStars() {
    const ovl = document.getElementById('overlay');
    if (!ovl || ovl.style.display === 'none') return;
    ox.clearRect(0, 0, oc.width, oc.height);
    stars.forEach(s => {
      s.ph += s.sp;
      const a = s.op * (0.5 + 0.5 * Math.sin(s.ph));
      ox.fillStyle = `rgba(210,200,170,${a})`;
      ox.beginPath(); ox.arc(s.x * oc.width, s.y * oc.height, s.r, 0, Math.PI * 2); ox.fill();
    });
    requestAnimationFrame(tickStars);
  }
  tickStars();
})();
</script>

<script>
// Global volume object — read every frame by world audio update
window._COSMOS_VOL = { world: 0.38, fires: 0.48, bubbles: 0.65 };
(function () {
  const ids = ['world', 'fires', 'bubbles'];
  ids.forEach(k => {
    const el = document.getElementById('vol-' + k);
    if (!el) return;
    el.value = Math.round(window._COSMOS_VOL[k] * 100);
    el.addEventListener('input', () => {
      window._COSMOS_VOL[k] = el.value / 100;
    });
  });
})();
</script>

<script type="module">
import { Engine }   from './engine/Engine.js';
import { WorldOne } from './worlds/world_01.js';

// Try to load Resonance Audio async — if it fails, HRTF fallback kicks in
const resSrc = 'https://cdn.jsdelivr.net/npm/resonance-audio/build/resonance-audio.min.js';
await new Promise(resolve => {
  const s = document.createElement('script');
  s.src = resSrc;
  s.onload = resolve;
  s.onerror = resolve; // fail silently → HRTF fallback
  document.head.appendChild(s);
});

const engine = new Engine('c');
engine.loadWorld(new WorldOne());

// Start on click or keydown — click is primary, keyboard also works
const _startGame = () => {
  const overlay = document.getElementById('overlay');
  if (!overlay || overlay.style.display === 'none') return;
  overlay.style.display = 'none';
  engine.start();
};
document.getElementById('overlay').addEventListener('click', _startGame, { once: true });
document.addEventListener('keydown', _startGame, { once: true });
</script>

</body>
</html>
