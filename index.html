<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>COSMOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center;
           height: 100vh; overflow: hidden; }
    canvas {
      display: block; cursor: none;
      max-width: 100vw; max-height: 100vh;
      width: auto; height: auto;
      image-rendering: pixelated;
    }
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: rgba(195,200,198,0.68);
      font-family: Palatino, 'Palatino Linotype', 'Book Antiqua', Georgia, serif;
      letter-spacing: 0.32em;
      z-index: 10; cursor: pointer; user-select: none;
    }
    #overlay h1 { font-size: 30px; font-weight: normal; font-style: italic; margin-bottom: 28px; }
    #overlay p  { font-size: 10px; opacity: 0.35;
                  font-family: Menlo, 'SF Mono', 'Courier New', monospace;
                  letter-spacing: 0.18em; font-style: normal; }
  </style>
</head>
<body>

<div id="overlay">
  <canvas id="starfield" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0.55;"></canvas>
  <h1 style="position:relative;">C O S M O S</h1>
  <p style="position:relative; margin-top:12px;">click to begin</p>
  <p style="position:relative; margin-top:28px; font-size:9px; opacity:0.28; letter-spacing:0.30em;">WASD / ARROWS &nbsp;·&nbsp; ENTER to enter &nbsp;·&nbsp; ESC to exit</p>
</div>

<canvas id="c"></canvas>

<script>
// Starfield animation on the overlay
(function () {
  const oc = document.getElementById('starfield');
  const resize = () => { oc.width = window.innerWidth; oc.height = window.innerHeight; };
  resize(); window.addEventListener('resize', resize);
  const ox = oc.getContext('2d');
  const stars = Array.from({ length: 180 }, () => ({
    x: Math.random(), y: Math.random(),
    r: 0.4 + Math.random() * 1.2,
    op: 0.15 + Math.random() * 0.55,
    ph: Math.random() * Math.PI * 2,
    sp: 0.004 + Math.random() * 0.012,
  }));
  function tickStars() {
    const ovl = document.getElementById('overlay');
    if (!ovl || ovl.style.display === 'none') return;
    ox.clearRect(0, 0, oc.width, oc.height);
    stars.forEach(s => {
      s.ph += s.sp;
      const a = s.op * (0.5 + 0.5 * Math.sin(s.ph));
      ox.fillStyle = `rgba(210,200,170,${a})`;
      ox.beginPath(); ox.arc(s.x * oc.width, s.y * oc.height, s.r, 0, Math.PI * 2); ox.fill();
    });
    requestAnimationFrame(tickStars);
  }
  tickStars();
})();
</script>

<script type="module">
import { Engine }   from './engine/Engine.js';
import { WorldOne } from './worlds/world_01.js';

const engine = new Engine('c');
engine.loadWorld(new WorldOne());

document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  engine.start();
}, { once: true });
</script>

</body>
</html>
